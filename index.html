let state = { step: -1, answers: [] };
const app = document.getElementById('app');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const stepLabel = document.getElementById('step-label');
const formref = document.getElementById('formref');

function setProgress(n) {
  const total = QUESTIONS.length;
  if (n < 0 || n >= total) { progressWrap.style.display = 'none'; stepLabel.style.display = 'none'; return; }
  progressWrap.style.display = 'block';
  stepLabel.style.display = 'block';
  progressBar.style.width = ((n) / total * 100) + '%';
  stepLabel.textContent = `Fråga ${n + 1} av ${total}`;
}

function renderIntro() {
  app.innerHTML = `
    <div class="intro fade-in">
      <h1 class="title">Vilken sekt borde du joina?</h1>
      <p>Detta instrument är avsett att kartlägga individuella benägenheter avseende vardagsstruktur, social organisering och meningsskapande.</p>
      <p>Besvara frågorna utifrån hur du faktiskt brukar tänka och agera, inte hur du önskar att du gjorde. Det finns inga rätta svar.</p>
      <div class="meta-row">
        <span><b>Antal frågor</b>12</span>
        <span><b>Tidsåtgång</b>≈ 5 min</span>
        <span><b>Anonymt</b>Ja</span>
      </div>
      <button class="btn primary" id="start">Påbörja testet</button>
    </div>`;
  document.getElementById('start').onclick = () => { state.step = 0; render(); };
}

function renderQuestion() {
  setProgress(state.step);
  const q = QUESTIONS[state.step];
  const opts = q.options.map(([letter, text]) => `
    <button class="btn" data-letter="${letter}">
      <span class="letter">${letter}</span>${text}
    </button>`).join('');
  app.innerHTML = `
    <div class="fade-in" key="${state.step}">
      <h2 class="q">${state.step + 1}. ${q.q}</h2>
      ${opts}
      ${state.step > 0 ? `<button class="btn ghost" id="back">← Föregående fråga</button>` : ''}
    </div>`;
  app.querySelectorAll('button[data-letter]').forEach(b => {
    b.onclick = () => {
      state.answers[state.step] = b.dataset.letter;
      if (state.step < QUESTIONS.length - 1) {
        state.step++;
        render();
      } else {
        state.step = QUESTIONS.length;
        render();
      }
    };
  });
  const back = document.getElementById('back');
  if (back) back.onclick = () => { state.step--; render(); };
}

function tally() {
  const t = { A: 0, B: 0, C: 0, D: 0 };
  state.answers.forEach(a => t[a] = (t[a] || 0) + 1);
  return t;
}

  const order = ['A', 'B', 'C', 'D'];
  let best = order[0];
  for (const k of order) if (t[k] > t[best]) best = k;
  return best;
}

function renderResult() {
  setProgress(-1);
  formref.textContent = 'Resultatbedömning · 4B-rev.2';
  const t = tally();
  const winner = pickWinner(t);
  const r = RESULTS[winner];
  const cells = ['A', 'B', 'C', 'D'].map(k => `
    <div class="cell ${k === winner ? '' : 'dim'}">
      <div class="num">${t[k]}</div>
      <div class="lbl">${k}</div>
    </div>`).join('');
  const bodyHtml = r.body.map(p => `<p>${p}</p>`).join('');
  app.innerHTML = `
    <div class="fade-in">
      <div class="result-tag">Matchad rörelse</div>
      <h1 class="result-title serif">${r.name}</h1>
      <div class="result-sub">${r.sub}</div>
      <div class="tally">${cells}</div>
      <div class="result-body">${bodyHtml}</div>
      <div class="share-row">
        <button class="btn ghost" id="share">Dela resultat</button>
        <button class="btn ghost" id="restart">Gör om testet</button>
      </div>
    </div>`;
  document.getElementById('restart').onclick = () => {
    state = { step: -1, answers: [] };
    formref.textContent = 'Formulär 4B-rev.2';
    render();
  };
  document.getElementById('share').onclick = async () => {
    const text = `Min svarsprofil matchade ${r.name}. Vilken sekt borde du joina?`;
    const url = location.href.split('?')[0];
    if (navigator.share) {
      try { await navigator.share({ title: 'Vilken sekt borde du joina?', text, url }); } catch(e) {}
    } else {
      try {
        await navigator.clipboard.writeText(`${text}\n${url}`);
        const b = document.getElementById('share');
        const orig = b.textContent;
        b.textContent = 'Länk kopierad';
        setTimeout(() => b.textContent = orig, 2000);
      } catch(e) {}
    }
  };
}

function render() {
  if (state.step < 0) { formref.textContent = 'Formulär 4B-rev.2'; renderIntro(); }
  else if (state.step < QUESTIONS.length) { renderQuestion(); window.scrollTo({ top: 0, behavior: 'instant' }); }
  else renderResult();
}

render();
</script>
</body>
</html>
